<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legal Transcript Formatter Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

<style>
:root {
    --legal-blue: #1a2a6c;
    --border: #ccd1d9;
}

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #d9e2ec);
    padding: 20px;
}

.wrapper {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    border-top: 6px solid var(--legal-blue);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
    color: var(--legal-blue);
    letter-spacing: 1px;
}

.section {
    margin-bottom: 25px;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
}

label {
    font-weight: 600;
    font-size: 0.8rem;
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

.hidden { display: none; }

.save-btn {
    background: var(--legal-blue);
    color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
<h2>Legal Transcript Formatter</h2>

<div class="section">
<label>Forum</label>
<select id="forum">
<option>DISCIPLINARY HEARING</option>
<option>CCMA</option>
<option>LABOUR COURT</option>
</select>

<label>Place</label>
<input type="text" id="place" placeholder="e.g. Johannesburg">

<label>Case Number</label>
<input type="text" id="caseNumber">
</div>

<div class="section">
<label>Upload Transcript (.txt / .docx)</label>
<input type="file" id="fileIn" accept=".txt,.docx">
</div>

<div style="text-align:center">
<button type="button" class="save-btn" onclick="processAndSave()">Generate & Save</button>
</div>
</div>

<script>
async function processAndSave() {
    try {
        const fileInput = document.getElementById('fileIn');
        if (!fileInput.files.length) {
            alert("Upload a file.");
            return;
        }

        const file = fileInput.files[0];
        let rawText = "";

        if (file.name.endsWith('.docx')) {
            const buffer = await file.arrayBuffer();
            const res = await mammoth.extractRawText({arrayBuffer: buffer});
            rawText = res.value;
        } else {
            rawText = await file.text();
        }

        const lines = rawText.split('\n').filter(l => l.trim() !== "");
        await createWordDocument(lines, file.name);

    } catch (e) {
        alert("ERROR: " + e.message);
        console.error(e);
    }
}

async function createWordDocument(lines, originalName) {
    const { Document, Packer, Paragraph, TextRun, AlignmentType, TabStopType, PageNumber } = docx;

    const children = [];

    // HEADER
    children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        children: [new TextRun("LEGAL TRANSCRIPT")]
    }));

    children.push(new Paragraph(" "));

    // TRANSCRIPT WITH REAL ALIGNMENT
    lines.forEach((text, i) => {

        const match = text.match(/^\s*\[?([^\]:]+)\]?\s*:\s*(.*)$/);

        let name = "";
        let dialogue = text;

        if (match) {
            name = match[1].toUpperCase();
            dialogue = match[2];
        }

        let lineNum = (i % 5 === 0) ? (i + 1).toString().padEnd(4) : "    ";

        children.push(new Paragraph({
            tabStops: [
                {
                    type: TabStopType.LEFT,
                    position: 4000
                }
            ],
            spacing: { line: 360 },
            children: [
                new TextRun({
                    text: lineNum + name + ":",
                    bold: true,
                    font: "Courier New",
                    size: 24
                }),
                new TextRun({
                    text: "\t" + dialogue,
                    font: "Courier New",
                    size: 24
                })
            ]
        }));
    });

    const doc = new Document({
        sections: [{
            children: children,
            footers: {
                default: new docx.Footer({
                    children: [
                        new Paragraph({
                            alignment: AlignmentType.RIGHT,
                            children: [
                                new TextRun("Page "),
                                new TextRun({ children: [PageNumber.CURRENT] })
                            ]
                        })
                    ]
                })
            }
        }]
    });

    let safeName = originalName.split('.')[0] + ".docx";

    try {
        const blob = await Packer.toBlob(doc);

        if (window.navigator && window.navigator.msSaveOrOpenBlob) {
            window.navigator.msSaveOrOpenBlob(blob, safeName);
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");

            a.href = url;
            a.download = safeName;

            document.body.appendChild(a);
            a.click();

            setTimeout(() => {
                URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 100);
        }

    } catch (err) {
        console.error("DOCX failed:", err);

        // FALLBACK TXT DOWNLOAD
        const fallbackBlob = new Blob([lines.join("\n")], { type: "text/plain" });
        const url = URL.createObjectURL(fallbackBlob);

        const a = document.createElement("a");
        a.href = url;
        a.download = safeName.replace(".docx", ".txt");

        document.body.appendChild(a);
        a.click();

        setTimeout(() => {
            URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }, 100);

        alert("DOCX failed — downloaded TXT instead.");
    }
}
</script>

</body>
</html>
