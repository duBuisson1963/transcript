<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Transcript Formatter</title>
    
    <script src="https://unpkg.com/docx@7.1.1/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-top: 0; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; background: #fafafa; border-radius: 5px; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 14px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #aaa; border-radius: 4px; font-size: 14px; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 20px; }
        .flex-col { flex: 1; }
        .dynamic-box { padding: 10px; background: #eee; margin-top: 10px; border-radius: 4px; border: 1px dashed #ccc; }
        button { background: #2c3e50; color: white; padding: 15px 30px; border: none; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1a252f; }
    </style>
</head>
<body>

<div class="container">
    <h1>Legal Transcript Formatter</h1>

    <div class="section">
        <label>Select Forum</label>
        <select id="forum" onchange="updateUI()">
            <option value="">-- Select Forum --</option>
            <option value="DISCIPLINARY HEARING">Disciplinary Hearing</option>
            <option value="COMMISSION FOR CONCILIATION, MEDIATION & ARBITRATION">CCMA</option>
            <option value="LABOUR COURT OF SOUTH AFRICA">Labour Court</option>
            <option value="OTHER">Other</option>
        </select>
        <input type="text" id="otherForum" class="hidden" placeholder="Type custom forum name...">
    </div>

    <div class="section flex-row">
        <div class="flex-col">
            <label>Place</label>
            <input type="text" id="place" placeholder="e.g. Johannesburg" oninput="updateCasePrefix()">
        </div>
        <div class="flex-col" id="caseBox">
            <label>Case Number</label>
            <input type="text" id="caseNumber" placeholder="Prefix added automatically...">
        </div>
    </div>

    <div class="section" id="partiesSection">
        <div id="disciplinaryParties" class="hidden">
            <label>Name of Employer</label><input type="text" id="empName">
            <label>Name of Employee</label><input type="text" id="employeeName">
            <label>Name of Initiator</label><input type="text" id="initiatorName">
            <label>Employee Representative</label><input type="text" id="empRepName">
        </div>

        <div id="legalParties" class="hidden">
            <div class="flex-row">
                <div class="flex-col">
                    <label>How many Applicants?</label>
                    <input type="number" id="appCount" value="1" min="1" oninput="generateInputs('Applicant', 'appCount', 'appDiv')">
                </div>
                <div class="flex-col">
                    <label>How many Respondents?</label>
                    <input type="number" id="resCount" value="1" min="1" oninput="generateInputs('Respondent', 'resCount', 'resDiv')">
                </div>
            </div>
            <div id="appDiv" class="dynamic-box"></div>
            <div id="resDiv" class="dynamic-box"></div>
            
            <label>Legal Entity acting for Applicants?</label>
            <select id="legalEntity" onchange="document.getElementById('otherEntity').className = this.value === 'OTHER' ? '' : 'hidden'">
                <option value="NONE">None</option>
                <option value="BEMAWU">BEMAWU</option>
                <option value="OTHER">Other</option>
            </select>
            <input type="text" id="otherEntity" class="hidden" placeholder="Specify Entity...">
            
            <label>Appearance on behalf of Applicant</label><input type="text" id="appRep">
            <label>Appearance on behalf of Respondent</label><input type="text" id="resRep">
        </div>
    </div>

    <div class="section">
        <label id="officialLabel">Chairperson / Commissioner</label>
        <input type="text" id="officialName">

        <label>Date of Hearing</label>
        <input type="date" id="hearingDate">

        <label>How many Witnesses?</label>
        <input type="number" id="witCount" value="1" min="0" oninput="generateInputs('Witness', 'witCount', 'witDiv')">
        <div id="witDiv" class="dynamic-box"></div>
    </div>

    <div class="section">
        <label>Upload Transcript (.txt or .docx)</label>
        <input type="file" id="uploadFile" accept=".txt,.docx">

        <label>Formatting Style</label>
        <select id="formatStyle">
            <option value="tabbed">Tabbed (Table-based Alignment)</option>
            <option value="justified">Justified (Table-based Alignment)</option>
        </select>
    </div>

    <button type="button" onclick="executeExport()">Export Word Doc & PDF</button>
</div>

<script>
    let prefixData = JSON.parse(localStorage.getItem('casePrefixes')) || { "johannesburg": "GAJB" };

    function updateUI() {
        const forum = document.getElementById('forum').value;
        document.getElementById('otherForum').className = forum === 'OTHER' ? '' : 'hidden';
        document.getElementById('disciplinaryParties').className = forum === 'DISCIPLINARY HEARING' ? '' : 'hidden';
        document.getElementById('legalParties').className = (forum !== 'DISCIPLINARY HEARING' && forum !== '') ? '' : 'hidden';
        document.getElementById('caseBox').className = forum === 'DISCIPLINARY HEARING' ? 'flex-col hidden' : 'flex-col';
        document.getElementById('officialLabel').innerText = forum === 'DISCIPLINARY HEARING' ? 'Name of Chairperson' : 'Name of Commissioner';
        
        generateInputs('Applicant', 'appCount', 'appDiv');
        generateInputs('Respondent', 'resCount', 'resDiv');
        generateInputs('Witness', 'witCount', 'witDiv');
    }

    function generateInputs(label, countId, divId) {
        const count = document.getElementById(countId) ? parseInt(document.getElementById(countId).value) : 0;
        const div = document.getElementById(divId);
        if(!div) return;
        div.innerHTML = `<strong>${label}s:</strong>`;
        for(let i=1; i<=count; i++) {
            div.innerHTML += `<input type="text" placeholder="${label} ${i} Name">`;
        }
    }

    function updateCasePrefix() {
        const place = document.getElementById('place').value.toLowerCase().trim();
        if (prefixData[place]) document.getElementById('caseNumber').value = prefixData[place] + "/";
    }

    window.onload = function() { updateUI(); };

    // Helper for ordinals (1st, 2nd, 3rd)
    function getOrdinal(n) {
        let s = ["th", "st", "nd", "rd"];
        let v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function formatTurboscribe(rawText) {
        let blocks = [];
        let linesArr = rawText.split('\n');
        let currentSpeaker = "";
        let currentDialogue = [];

        for (let i = 0; i < linesArr.length; i++) {
            let line = linesArr[i].trim();
            if (!line) continue;

            let standaloneMatch = line.match(/^\[(.*?)\]:?$/);
            let inlineMatch = line.match(/^\[?(.*?)\]?:\s*(.*)/);

            if (standaloneMatch) {
                if (currentSpeaker || currentDialogue.length > 0) {
                    blocks.push({ speaker: currentSpeaker, text: currentDialogue.join(' ') });
                }
                currentSpeaker = standaloneMatch[1].trim(); 
                currentDialogue = [];
            } else if (inlineMatch && inlineMatch[1].length < 40) {
                if (currentSpeaker || currentDialogue.length > 0) {
                    blocks.push({ speaker: currentSpeaker, text: currentDialogue.join(' ') });
                }
                currentSpeaker = inlineMatch[1].replace(/[\[\]]/g, '').trim();
                currentDialogue = [inlineMatch[2].trim()];
            } else {
                currentDialogue.push(line);
            }
        }
        if (currentSpeaker || currentDialogue.length > 0) {
            blocks.push({ speaker: currentSpeaker, text: currentDialogue.join(' ') });
        }
        return blocks;
    }

    async function executeExport() {
        const fileInput = document.getElementById('uploadFile');
        if (!fileInput.files.length) return alert("Please upload a file first.");

        const file = fileInput.files[0];
        const style = document.getElementById('formatStyle').value;
        const originalName = file.name.split('.')[0];
        
        // Extract all Form Metadata to pass to the generators
        const meta = {
            forum: document.getElementById('forum').value,
            otherForum: document.getElementById('otherForum').value,
            place: document.getElementById('place').value.trim(),
            isDisciplinary: document.getElementById('forum').value === 'DISCIPLINARY HEARING',
            empName: document.getElementById('empName').value.trim(),
            employeeName: document.getElementById('employeeName').value.trim(),
            initiatorName: document.getElementById('initiatorName').value.trim(),
            empRepName: document.getElementById('empRepName').value.trim(),
            apps: Array.from(document.getElementById('appDiv').querySelectorAll('input')).map(i => i.value.trim()),
            ress: Array.from(document.getElementById('resDiv').querySelectorAll('input')).map(i => i.value.trim()),
            appRep: document.getElementById('appRep').value.trim(),
            resRep: document.getElementById('resRep').value.trim(),
            officialName: document.getElementById('officialName').value.trim(),
            hearingDate: document.getElementById('hearingDate').value
        };

        try {
            let text = "";
            if (file.name.endsWith('.docx')) {
                const buffer = await file.arrayBuffer();
                const res = await mammoth.extractRawText({arrayBuffer: buffer});
                text = res.value;
            } else {
                text = await file.text();
            }

            const dialogueBlocks = formatTurboscribe(text);

            let longest = 0;
            dialogueBlocks.forEach(b => {
                if (b.speaker && b.speaker.length > longest) longest = b.speaker.length;
            });

            await exportDocx(dialogueBlocks, longest, originalName, style, meta);
            exportPdf(dialogueBlocks, longest, originalName, style, meta);

        } catch (err) {
            console.error(err);
            alert("System Error: " + err.message);
        }
    }

    async function exportDocx(blocks, longest, fileName, style, meta) {
        const { Document, Packer, Paragraph, TextRun, AlignmentType, BorderStyle, PageNumber, Table, TableRow, TableCell, WidthType } = docx;
        
        const lineNumColWidth = 600; 
        const nameColWidth = (longest * 120) + 400; 
        const alignRule = style === 'justified' ? AlignmentType.JUSTIFIED : AlignmentType.LEFT;
        let forumName = meta.forum === 'OTHER' ? meta.otherForum : meta.forum;

        const noBorders = {
            top: { style: BorderStyle.NONE, size: 0, color: "auto" },
            bottom: { style: BorderStyle.NONE, size: 0, color: "auto" },
            left: { style: BorderStyle.NONE, size: 0, color: "auto" },
            right: { style: BorderStyle.NONE, size: 0, color: "auto" },
            insideHorizontal: { style: BorderStyle.NONE, size: 0, color: "auto" },
            insideVertical: { style: BorderStyle.NONE, size: 0, color: "auto" },
        };

        const docChildren = [];

        // 1. Header Information (Centered, 12pt and 22pt)
        docChildren.push(new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "IN THE", size: 24 })] }));
        docChildren.push(new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: forumName.toUpperCase(), bold: true, size: 44 })] }));
        docChildren.push(new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: `HELD AT ${meta.place.toUpperCase()}`, bold: true, size: 24 })] })); // 12pt Centered
        docChildren.push(new Paragraph({ spacing: { before: 240, after: 240 }, children: [new TextRun({ text: "IN THE MATTER BETWEEN:", bold: true, size: 24 })] }));

        // 2. Parties Table (Left & Right Justified)
        function createPartyRow(leftText, rightText) {
            return new TableRow({
                children: [
                    new TableCell({ borders: noBorders, children: [new Paragraph({ children: [new TextRun({ text: leftText, size: 24, bold: true })] })] }),
                    new TableCell({ borders: noBorders, children: [new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun({ text: rightText, size: 24, bold: true })] })] })
                ]
            });
        }

        let partyRows = [];
        if (meta.isDisciplinary) {
            if(meta.empName) partyRows.push(createPartyRow(meta.empName, "EMPLOYER"));
            if(meta.employeeName) partyRows.push(createPartyRow(meta.employeeName, "EMPLOYEE"));
        } else {
            meta.apps.forEach((app, i) => { if(app) partyRows.push(createPartyRow(app, `${getOrdinal(i+1)} APPLICANT`)); });
            meta.ress.forEach((res, i) => { if(res) partyRows.push(createPartyRow(res, `${getOrdinal(i+1)} RESPONDENT`)); });
        }

        if(partyRows.length > 0) {
            docChildren.push(new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, borders: noBorders, rows: partyRows }));
        }

        // 3. Representatives & Officials (Left Justified, below parties)
        docChildren.push(new Paragraph({ spacing: { before: 240 }, children: [] }));
        if (meta.isDisciplinary) {
            if (meta.initiatorName) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Initiator: ${meta.initiatorName}`, size: 24 })] }));
            if (meta.empRepName) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Employee Representative: ${meta.empRepName}`, size: 24 })] }));
            if (meta.officialName) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Chairperson: ${meta.officialName}`, size: 24 })] }));
        } else {
            if (meta.appRep) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Appearance for Applicant: ${meta.appRep}`, size: 24 })] }));
            if (meta.resRep) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Appearance for Respondent: ${meta.resRep}`, size: 24 })] }));
            if (meta.officialName) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Commissioner: ${meta.officialName}`, size: 24 })] }));
        }
        if (meta.hearingDate) docChildren.push(new Paragraph({ children: [new TextRun({ text: `Date of Hearing: ${meta.hearingDate}`, size: 24 })] }));

        // 4. Solid Separator Line
        docChildren.push(new Paragraph({
            border: { bottom: { color: "auto", style: BorderStyle.SINGLE, size: 6 } },
            spacing: { after: 400 },
            children: [new TextRun({ text: "" })]
        }));

        // 5. UNTOUCHED: Transcript Generation
        const tableRows = blocks.map((block, i) => {
            let lineNumString = (i % 5 === 0) ? (i + 1).toString() : "";
            let speakerName = block.speaker ? block.speaker.toUpperCase() : "";

            let nameRuns = [];
            if (speakerName) {
                nameRuns.push(new TextRun({ text: speakerName, font: "Courier New", size: 24, underline: { type: "single" } }));
                nameRuns.push(new TextRun({ text: ":", font: "Courier New", size: 24 }));
            }

            return new TableRow({
                children: [
                    new TableCell({
                        width: { size: lineNumColWidth, type: WidthType.DXA }, borders: noBorders,
                        children: [new Paragraph({ spacing: { line: 480, after: 280 }, children: [new TextRun({ text: lineNumString, font: "Courier New", size: 24 })] })]
                    }),
                    new TableCell({
                        width: { size: nameColWidth, type: WidthType.DXA }, borders: noBorders,
                        children: [new Paragraph({ spacing: { line: 480, after: 280 }, children: nameRuns })]
                    }),
                    new TableCell({
                        width: { size: 100, type: WidthType.PERCENTAGE }, borders: noBorders,
                        children: [new Paragraph({ alignment: alignRule, spacing: { line: 480, after: 280 }, children: [new TextRun({ text: block.text, font: "Courier New", size: 24 })] })]
                    })
                ]
            });
        });

        docChildren.push(new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: tableRows }));

        // 6. Transcriber's Certificate
        docChildren.push(new Paragraph({ spacing: { before: 500 }, border: { top: { style: BorderStyle.SINGLE, size: 6 } }, children: [new TextRun({ text: "TRANSCRIBER'S CERTIFICATE", bold: true })] }));
        docChildren.push(new Paragraph({ children: [new TextRun("I hereby certify that the above is a true and correct record of the proceedings.") ] }));
        docChildren.push(new Paragraph({ spacing: { before: 400 }, children: [new TextRun(`SIGNED AT ${meta.place.toUpperCase()} ON THIS ____ DAY OF ___________ 2026`) ] }));

        const doc = new Document({
            sections: [{
                properties: { page: { margin: { top: 1440, bottom: 1440, left: 1440, right: 1440 } } },
                footers: { default: new docx.Footer({ children: [new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun("Page "), new TextRun({ children: [PageNumber.CURRENT] })] })] }) },
                children: docChildren
            }]
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${fileName}_${style}.docx`);
        });
    }

    function exportPdf(blocks, longest, fileName, style, meta) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ format: 'a4', unit: 'mm' });
        
        let y = 20;
        let pageNum = 1;
        let physicalLineCount = 0; 
        const pageHeight = pdf.internal.pageSize.getHeight();
        let forumName = meta.forum === 'OTHER' ? meta.otherForum : meta.forum;

        const checkPage = () => {
            if (y > pageHeight - 20) {
                pdf.text(`Page ${pageNum}`, 190, 287, { align: 'right' });
                pdf.addPage();
                y = 20;
                pageNum++;
                physicalLineCount = 0; 
            }
        };

        // 1. Header Information (Centered)
        pdf.setFont("helvetica", "normal"); pdf.setFontSize(12);
        pdf.text("IN THE", 105, y, { align: 'center' }); y += 8;
        pdf.setFont("helvetica", "bold"); pdf.setFontSize(22);
        pdf.text(forumName.toUpperCase(), 105, y, { align: 'center' }); y += 10;
        
        pdf.setFontSize(12);
        pdf.text(`HELD AT ${meta.place.toUpperCase()}`, 105, y, { align: 'center' }); y += 15; // 12pt Centered
        
        pdf.text("IN THE MATTER BETWEEN:", 20, y); y += 10;

        // 2. Parties (Left & Right Justified)
        if (meta.isDisciplinary) {
            if(meta.empName) { pdf.text(meta.empName, 20, y); pdf.text("EMPLOYER", 190, y, { align: 'right' }); y += 7; }
            if(meta.employeeName) { pdf.text(meta.employeeName, 20, y); pdf.text("EMPLOYEE", 190, y, { align: 'right' }); y += 7; }
        } else {
            meta.apps.forEach((app, i) => { if(app) { pdf.text(app, 20, y); pdf.text(`${getOrdinal(i+1)} APPLICANT`, 190, y, { align: 'right' }); y += 7; } });
            meta.ress.forEach((res, i) => { if(res) { pdf.text(res, 20, y); pdf.text(`${getOrdinal(i+1)} RESPONDENT`, 190, y, { align: 'right' }); y += 7; } });
        }

        y += 5;

        // 3. Representatives & Officials (Left Justified)
        pdf.setFont("helvetica", "normal");
        if (meta.isDisciplinary) {
            if (meta.initiatorName) { pdf.text(`Initiator: ${meta.initiatorName}`, 20, y); y += 7; }
            if (meta.empRepName) { pdf.text(`Employee Representative: ${meta.empRepName}`, 20, y); y += 7; }
            if (meta.officialName) { pdf.text(`Chairperson: ${meta.officialName}`, 20, y); y += 7; }
        } else {
            if (meta.appRep) { pdf.text(`Appearance for Applicant: ${meta.appRep}`, 20, y); y += 7; }
            if (meta.resRep) { pdf.text(`Appearance for Respondent: ${meta.resRep}`, 20, y); y += 7; }
            if (meta.officialName) { pdf.text(`Commissioner: ${meta.officialName}`, 20, y); y += 7; }
        }
        if (meta.hearingDate) { pdf.text(`Date of Hearing: ${meta.hearingDate}`, 20, y); y += 7; }

        y += 5;

        // 4. Solid Separator Line
        pdf.line(20, y, 190, y); 
        y += 15; // Gap before transcript starts

        // 5. UNTOUCHED: Transcript Generation
        pdf.setFont("courier", "normal");
        pdf.setFontSize(10);
        
        const lineNumX = 10;
        const nameX = 20;
        const charWidth = pdf.getTextWidth("X");
        const dialogueX = nameX + (longest * charWidth) + 8; 

        blocks.forEach(block => {
            let name = block.speaker ? block.speaker.toUpperCase() : "";
            
            if (name) {
                checkPage();
                physicalLineCount++;
                if (physicalLineCount % 5 === 0) pdf.text(physicalLineCount.toString(), lineNumX, y); 
                
                pdf.text(name, nameX, y);
                let nameWidth = pdf.getTextWidth(name);
                pdf.line(nameX, y + 1, nameX + nameWidth, y + 1); 
                pdf.text(":", nameX + nameWidth, y); 
                
                let splitDialogue = pdf.splitTextToSize(block.text, 190 - dialogueX);
                
                splitDialogue.forEach((textPart, idx) => {
                    if (idx > 0) {
                        y += 7; 
                        checkPage();
                        physicalLineCount++;
                        if (physicalLineCount % 5 === 0) pdf.text(physicalLineCount.toString(), lineNumX, y); 
                    }
                    pdf.text(textPart, dialogueX, y, { align: style === 'justified' ? 'justify' : 'left', maxWidth: 190 - dialogueX });
                });
                
                y += 7; 
                y += 5; 
            } else {
                let splitText = pdf.splitTextToSize(block.text, 190 - nameX);
                splitText.forEach((textPart, idx) => {
                    checkPage();
                    physicalLineCount++;
                    if (physicalLineCount % 5 === 0) pdf.text(physicalLineCount.toString(), lineNumX, y); 
                    pdf.text(textPart, nameX, y, { align: style === 'justified' ? 'justify' : 'left', maxWidth: 190 - nameX });
                    y += 7; 
                });
                y += 5; 
            }
        });

        checkPage();
        y += 10;
        pdf.setFont("helvetica", "bold"); pdf.setFontSize(12);
        pdf.text("TRANSCRIBER'S CERTIFICATE", 20, y); y += 8;
        pdf.setFont("helvetica", "normal");
        pdf.text("I hereby certify that the above is a true and correct record of the proceedings.", 20, y); y += 10;
        pdf.text(`SIGNED AT ${meta.place.toUpperCase()} ON THIS ____ DAY OF ___________ 2026`, 20, y);
        pdf.text(`Page ${pageNum}`, 190, 287, { align: 'right' });
        
        pdf.save(`${fileName}_${style}.pdf`);
    }
</script>

</body>
</html>
